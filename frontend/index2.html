<!doctype html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Cinematic Earth</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}
</style>

<script type="importmap">
{
"imports": {
"three": "https://unpkg.com/three@0.160.0/build/three.module.js",
"three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}
}
</script>

</head>

<body>

<script type="module">

import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";


/* Scene */

const scene = new THREE.Scene();



/* Camera */

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.001,
1000
);

camera.position.set(0,0,4);



/* Renderer */

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

renderer.setPixelRatio(window.devicePixelRatio);

renderer.outputColorSpace =
THREE.SRGBColorSpace;

renderer.physicallyCorrectLights = true;

document.body.appendChild(
renderer.domElement
);



/* CINEMATIC SUN LIGHT (Top Left) */

const sunLight =
new THREE.DirectionalLight(0xffffff,4);

sunLight.position.set(-8,10,6);

scene.add(sunLight);



/* VERY LOW AMBIENT → creates real day/night */

scene.add(
new THREE.AmbientLight(0xffffff,0.15)
);



/* Controls */

const controls =
new OrbitControls(
camera,
renderer.domElement
);

controls.enableDamping = true;
controls.enablePan = false;



/* Load Earth */

let globe;

const loader =
new GLTFLoader();

loader.load(

"./3d-models/earthtriangles1k.glb",

(gltf)=>{

globe = gltf.scene;


/* Blender Texture Fix */

globe.traverse((child)=>{

if(child.isMesh){

child.material.needsUpdate=true;

child.frustumCulled=false;

if(child.material.map){
child.material.map.colorSpace=
THREE.SRGBColorSpace;
}

child.material.metalness=0.1;
child.material.roughness=1;

}

});

scene.add(globe);



/* Camera Stabilization */

const box =
new THREE.Box3().setFromObject(globe);

const size =
box.getSize(new THREE.Vector3()).length();

const center =
box.getCenter(new THREE.Vector3());


controls.target.copy(center);


camera.near=size/500;
camera.far=size*50;

camera.updateProjectionMatrix();


controls.minDistance=size*0.7;
controls.maxDistance=size*8;

controls.update();



/* ATMOSPHERE GLOW */

const glowGeometry =
new THREE.SphereGeometry(size*0.25,64,64);

const glowMaterial =
new THREE.ShaderMaterial({

uniforms:{},

vertexShader:`

varying vec3 vNormal;

void main(){

vNormal=normalize(normalMatrix*normal);

gl_Position=
projectionMatrix*
modelViewMatrix*
vec4(position,1.0);

}

`,

fragmentShader:`

varying vec3 vNormal;

void main(){

float intensity =
pow(0.7-dot(vNormal,
vec3(0.0,0.0,1.0)),3.0);

gl_FragColor=
vec4(0.2,0.6,1.0,1.0)
*intensity;

}

`,

blending:THREE.AdditiveBlending,
side:THREE.BackSide,
transparent:true

});


const glowMesh=
new THREE.Mesh(
glowGeometry,
glowMaterial
);

scene.add(glowMesh);


},

undefined,

(error)=>{
console.error(error);
}

);



/* Animation */

function animate(){

requestAnimationFrame(animate);

controls.update();


/* Slow Earth rotation */

if(globe){
globe.rotation.y+=0.0015;
}


renderer.render(scene,camera);

}

animate();



/* Resize */

window.addEventListener(
"resize",
()=>{

camera.aspect=
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

</script>

</body>

</html>
