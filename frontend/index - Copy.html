<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>GLB Globe Viewer</title>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: black;
      }
    </style>

    <!-- Import Map -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>

  <body>
    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

      /* Scene */

      const scene = new THREE.Scene();

      /* Camera */

      const camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.001,
        1000,
      );

      camera.position.set(0, 0, 4);

      /* Renderer */

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
      });

      renderer.setSize(window.innerWidth, window.innerHeight);

      renderer.setPixelRatio(window.devicePixelRatio);

      renderer.outputColorSpace = THREE.SRGBColorSpace;

      renderer.physicallyCorrectLights = true;

      document.body.appendChild(renderer.domElement);

      /* Lights */

      const light = new THREE.DirectionalLight(0xffffff, 4);

      /* Top-left sun style light */

      light.position.set(-8, 10, 6);

      scene.add(light);

      scene.add(new THREE.AmbientLight(0xffffff, 0.6));

      /* Controls */

      const controls = new OrbitControls(camera, renderer.domElement);

      controls.enableDamping = true;

      controls.zoomSpeed = 0.8;

      controls.enablePan = false;

      /* Load GLB */

      let globe;

      const loader = new GLTFLoader();

      loader.load(
        "./3d-models/earthtriangles1k.glb",

        (gltf) => {
          globe = gltf.scene;

          /* Blender Texture + Stability Fix */

          globe.traverse((child) => {
            if (child.isMesh) {
              child.material.needsUpdate = true;

              child.frustumCulled = false;

              /* Texture fix */

              if (child.material.map) {
                child.material.map.colorSpace = THREE.SRGBColorSpace;
              }

              /* Lighting balance */

              child.material.metalness = 0.2;
              child.material.roughness = 0.8;
            }
          });

          scene.add(globe);

          /* Auto-stable zoom without forcing 0,0,0 */

          const box = new THREE.Box3().setFromObject(globe);

          const size = box.getSize(new THREE.Vector3()).length();

          const center = box.getCenter(new THREE.Vector3());

          controls.target.copy(center);

          /* Stable clipping */

          camera.near = size / 500;
          camera.far = size * 50;

          camera.updateProjectionMatrix();

          /* Stable zoom limits */

          controls.minDistance = size * 0.6;
          controls.maxDistance = size * 8;

          controls.update();
        },

        undefined,

        (error) => {
          console.error(error);
        },
      );

      /* Animation */

      function animate() {
        requestAnimationFrame(animate);

        controls.update();

        /* Small rotation animation */

        if (globe) {
          globe.rotation.y += 0.0015;
        }

        renderer.render(scene, camera);
      }

      animate();

      /* Resize */

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
